<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Technical Support | SILSEP Molecular</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <div class="container header-wrapper">
            <div class="logo"><a href="/"><img src="/assets/logo/silsep_logo.png" alt="SILSEP"></a></div>
            <nav>
                <ul>
                    <li><a href="/">Home</a></li>
                    <li><a href="/products">Products</a></li>
                    <li><a href="/about">About</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section style="background: var(--silsep-blue); color: #fff; padding: 60px 0; text-align: center;">
        <div class="container">
            <h1>Book a Technical Consultation</h1>
            <p>Direct access to our San Diego and Fujian technical experts.</p>
        </div>
    </section>

    <section style="padding: 100px 0;">
        <div class="container">
            <div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 50px; border-radius: 20px; border: 1px solid #eee; box-shadow: 0 20px 50px rgba(0,0,0,0.05);">
                <form action="/thank-you.html">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                        <div>
                            <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">Name</label>
                            <input type="text" name="name" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                        <div>
                            <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">Job Title</label>
                            <input type="text" name="job_title" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                        </div>
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">Company Email</label>
                        <input type="email" name="email"  style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">Company Name</label>
                        <input type="text" name="company" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                    </div>
                    <div style="margin-bottom: 20px;">
                        <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">Preferred Timezone</label>
                        <select name="timezone" required style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;">
                            <option value="Americas (EST/PST)">Americas (EST/PST)</option>
                            <option value="Europe (CET/GMT)">Europe (CET/GMT)</option>
                            <option value="Asia (CST/ICT)">Asia (CST/ICT)</option>
                        </select>
                    </div>
                    <div style="margin-bottom: 30px;">
                        <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">Project Message</label>
                        <textarea name="message" rows="4" style="width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 4px;"></textarea>
                    </div>
                    <button type="submit" class="btn-gold" style="width: 100%; padding: 15px; border: none; cursor: pointer; font-size: 16px;">Schedule Technical Call</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <!-- Global Footer -->
    </footer>
</body>
</html>
