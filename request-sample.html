<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Free Sample | SILSEP Molecular</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <img src="https://sc02.alicdn.com/kf/A1a8d9700b46e4657b437c78f1a9aba99z.png" alt="SILSEP Logo">
                </a>
            </div>
            <nav id="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="products.html">Solutions</a></li>
                    <li><a href="index.html#request-sample" class="btn-primary" style="background: var(--accent-color); color: white; padding: 10px 20px; border-radius: 50px; font-size: 11px; text-decoration: none;">Request Free Sample</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero" style="padding: 100px 0; background: #f4f7f9; text-align: center;">
        <div class="container">
            <h1 style="color: #0A2B4E;">Request 500g Technical Trial</h1>
            <p style="color: #666; max-width: 600px; margin: 20px auto;">Get a technical consultation and a free 500g sample pack for your facility. Engineered for stability and precision.</p>
        </div>
    </section>

    <section style="padding: 80px 0;">
        <div class="container">
            <div style="max-width: 600px; margin: 0 auto; background: #fff; padding: 50px; border-radius: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); border: 1px solid #eee;">
                <form name="standalone-trial-request" method="POST" data-netlify="true" action="/thank-you.html">
                    <input type="hidden" name="form-name" value="standalone-trial-request">
                    <div class="form-group">
                        <label>Full Name (姓名) *</label>
                        <input type="text" name="name" required placeholder="Your name">
                    </div>
                    <div class="form-group">
                        <label>Work Email (邮箱) *</label>
                        <input type="email" name="email"  placeholder="professional@company.com">
                    </div>
                    <div class="form-group">
                        <label>Company (公司) *</label>
                        <input type="text" name="company" required placeholder="Company Name">
                    </div>
                    <div class="form-group">
                        <label>Phone Number (电话) *</label>
                        <input type="tel" name="phone" required placeholder="Phone Number">
                    </div>
                    <div class="form-group">
                        <label>Delivery Address (收货地址) *</label>
                        <textarea name="address" required placeholder="Complete shipping address" style="width: 100%; padding: 12px; border: 1px solid #e2e8f0; border-radius: 10px; background: #f8fafc; font-size: 14px; resize: none;"></textarea>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; padding: 15px; border-radius: 10px;">Request 500g Trial</button>
                </form>
            </div>
        </div>
    </section>

    <script src="js/script.js"></script>
</body>
</html>
