<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Molecular Science Lab | 15 Years of Breakthroughs | Silsep</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;800&family=Plus+Jakarta+Sans:wght@800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --lab-bg: #020617;
            --lab-accent: #00A3FF;
            --lab-cyan: #00F0FF;
            --lab-gold: #FFD700;
            --glass: rgba(15, 23, 42, 0.8);
            --border: rgba(0, 163, 255, 0.2);
        }
        body { 
            background: var(--lab-bg); 
            color: #f1f5f9; 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow-x: hidden;
            scroll-behavior: smooth;
        }
        
        /* 3D Grid & Particle Background */
        .lab-hero {
            position: relative;
            height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at center, rgba(0, 163, 255, 0.2) 0%, transparent 80%);
            overflow: hidden;
        }
        .grid-bg {
            position: absolute;
            width: 200%;
            height: 200%;
            top: -50%;
            left: -50%;
            background-image: 
                linear-gradient(var(--border) 1px, transparent 1px),
                linear-gradient(90deg, var(--border) 1px, transparent 1px);
            background-size: 80px 80px;
            transform: perspective(1000px) rotateX(65deg);
            animation: gridMove 30s linear infinite;
            z-index: 0;
            opacity: 0.5;
        }
        @keyframes gridMove { from { transform: perspective(1000px) rotateX(65deg) translateY(0); } to { transform: perspective(1000px) rotateX(65deg) translateY(80px); } }

        .hero-content { position: relative; z-index: 10; text-align: center; }
        .hero-content h1 { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 82px; 
            font-weight: 800; 
            letter-spacing: -3px; 
            margin-bottom: 10px; 
            background: linear-gradient(180deg, #fff 0%, rgba(255,255,255,0.5) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hero-content p { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px; 
            color: var(--lab-cyan); 
            font-weight: 700; 
            letter-spacing: 6px; 
            text-transform: uppercase;
        }

        /* Timeline Container */
        .lab-timeline {
            max-width: 1300px;
            margin: 0 auto;
            padding: 100px 20px;
            position: relative;
        }
        .lab-timeline::before {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            width: 1px;
            height: 100%;
            background: linear-gradient(transparent, var(--lab-accent), var(--lab-accent), transparent);
            transform: translateX(-50%);
            opacity: 0.3;
        }

        /* Timeline Steps */
        .step {
            position: relative;
            margin-bottom: 250px;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0;
            transform: translateY(100px);
            transition: 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .step.visible { opacity: 1; transform: translateY(0); }

        .step-content {
            width: 45%;
            background: var(--glass);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 50px;
            position: relative;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
        }
        .step:nth-child(even) { flex-direction: row-reverse; }

        .step-number {
            position: absolute;
            left: 50%;
            top: -30px;
            transform: translateX(-50%);
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 120px;
            font-weight: 800;
            color: rgba(255, 255, 255, 0.03);
            z-index: -1;
            pointer-events: none;
        }

        .step-tag { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px; 
            color: var(--lab-cyan); 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            margin-bottom: 15px; 
            display: block; 
        }
        .step-title { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 36px; 
            margin-bottom: 25px; 
            color: #fff; 
            letter-spacing: -1px;
        }
        .step-desc { font-size: 17px; line-height: 1.8; color: #94a3b8; margin-bottom: 35px; }

        .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .stat-item { 
            padding: 20px; 
            background: rgba(255, 255, 255, 0.02); 
            border-radius: 16px; 
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        .stat-label { 
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px; 
            color: #64748b; 
            text-transform: uppercase; 
            margin-bottom: 8px; 
            display: block; 
            letter-spacing: 1px;
        }
        .stat-value { font-size: 15px; font-weight: 700; color: #f1f5f9; }

        .visual-frame {
            width: 45%;
            height: 450px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 50px rgba(0, 163, 255, 0.1);
        }
        
        /* Microscope HUD Effect */
        .visual-frame::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.6) 100%),
                repeating-linear-gradient(0deg, rgba(0, 163, 255, 0.03) 0px, transparent 1px, transparent 2px);
            z-index: 5;
            pointer-events: none;
        }

        .microscope-ui {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1px solid rgba(0, 240, 255, 0.2);
            z-index: 6;
            pointer-events: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transform: scale(1.2);
        }
        .microscope-ui::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 2px;
            background: var(--lab-cyan);
            left: 20px;
        }
        .microscope-ui::before {
            content: '';
            position: absolute;
            width: 2px;
            height: 20px;
            background: var(--lab-cyan);
            top: 20px;
        }

        .render-img {
            width: 120%;
            height: 120%;
            object-fit: cover;
            filter: saturate(1.2) brightness(0.8);
            transition: 2s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(1.1) rotate(-5deg);
        }
        .step.visible .render-img {
            transform: scale(1) rotate(0deg);
            filter: saturate(1.2) brightness(1.1);
        }

        /* Floating Badge */
        .impact-badge {
            position: absolute;
            bottom: 30px;
            right: 30px;
            background: var(--lab-gold);
            color: #000;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            z-index: 10;
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.3);
        }

        /* HUD Overlay */
        .hud-overlay { position: fixed; bottom: 40px; right: 40px; z-index: 100; text-align: right; pointer-events: none; }
        .hud-label { color: var(--lab-cyan); font-size: 10px; font-weight: 700; text-transform: uppercase; opacity: 0.6; margin-bottom: 5px; display: block; letter-spacing: 2px; }
        .hud-value { font-size: 14px; color: #fff; font-family: 'JetBrains Mono', monospace; }
    </style>

    <!-- Apollo: Website Visitor ID -->
    <script>
      function initApollo(){
        var n=Math.random().toString(36).substring(7),
        o=document.createElement("script");
        o.src="https://assets.apollo.io/micro/website-tracker/tracker.iife.js?nocache="+n,
        o.async=!0,o.defer=!0,
        o.onload=function(){
          window.trackingFunctions.onLoad({appId:"69eed6b2244daa001981357e"})
        },
        document.head.appendChild(o)
      }
      initApollo();
    </script>
</head>

        <div style="max-width: 1300px; margin: 0 auto; padding: 0 20px; display: flex; justify-content: space-between; align-items: center;">
            <div class="logo">
                <a href="../index.html"><img src="https://sc02.alicdn.com/kf/A1a8d9700b46e4657b437c78f1a9aba99z.png" alt="SILSEP Logo" style="height: 35px; filter: brightness(0) invert(1);"></a>
            </div>
            <nav>
                <ul style="list-style: none; display: flex; gap: 20px; margin: 0; padding: 0; font-family: 'JetBrains Mono', monospace;">
                    <li><a href="../index.html" style="text-decoration: none; color: #fff; font-weight: 600; font-size: 13px; text-transform: uppercase;">Home</a></li>

<div class="lab-hero">

</div>

<script>
    const ASSET_MAPPING = {
        'foundation': 'https://sc02.alicdn.com/kf/A04e922fd116b451182c51fb31e50746cz.png',
        'shielding': 'https://sc02.alicdn.com/kf/Ab20b8dd884a64a93bd76e72984457127U.png',
        'validation': 'https://sc02.alicdn.com/kf/A9e6986b7f59945cbaf52a83fa2d20842r.png',
        'digitalization': 'https://sc02.alicdn.com/kf/A9c7b6f54f0c946e48c63bbc041b90ea07.png' // Accio HD as placeholder for Digitalization
    };

    document.addEventListener('DOMContentLoaded', () => {
        const timeline = document.getElementById('lab-timeline');

        const timelineData = [
          {
            "id": "foundation",
            "period": "2011-2015",
            "title": "Pore Engineering Foundation",
            "location": "San Diego R&D Center",
            "breakthrough": "Achievement of 2nm Uniform Mesoporous Architecture in Synthetic Amorphous Silica (SAS).",
            "trial_ref": "Trial #01-A: Kinetic Adsorption",
            "impact": "Established the theoretical limit for surface area-to-volume ratio in feed carriers, enabling high-load liquid absorption without clumping.",
            "economic_contribution": "$12M industry-wide reduction in carrier waste.",
            "visual_tag": "2nm-pore-grid"
          },
          {
            "id": "shielding",
            "period": "2016-2020",
            "title": "Molecular Shielding & Protection",
            "location": "Global Feed Extrusion Trials",
            "breakthrough": "Invention of the 'Molecular Shield'—protecting sensitive phytase and protease at 95°C constant extrusion heat.",
            "trial_ref": "Trial #22: Thermal Defense",
            "impact": "88% recovery of bioactive payloads in tropical processing environments, bypassing the need for over-dosing.",
            "economic_contribution": "$24M annual enzyme cost recovery for Tier-1 feed mills.",
            "visual_tag": "thermal-shield-3d"
          },
          {
            "id": "validation",
            "period": "2021-2024",
            "title": "Mekong Delta Field Validation",
            "location": "Vietnam Aquaculture Hub",
            "breakthrough": "Real-world validation of 'Cation Magnet' technology for rapid Ammonia-N reduction and AGP-free gut integrity.",
            "trial_ref": "Trial #31 & Trial #05",
            "impact": "-1.5ppm Ammonia-N reduction within 4 hours; 40% reduction in mortality during high-density shrimp cycles.",
            "economic_contribution": "$1.2k per hectare profit increase for semi-intensive farms.",
            "visual_tag": "mekong-delta-trial"
          },
          {
            "id": "digitalization",
            "period": "2025-2026+",
            "title": "Scientific Empire & Digitalization",
            "location": "Silsep Command Center",
            "breakthrough": "Integration of Matrix 1000 Autonomous Outreach and Aqua-Profit™ Real-time ROI Forecasting.",
            "trial_ref": "Trial #38: Digital Correlation",
            "impact": "Closing the loop between molecular science and farm-gate profitability through AI-driven nutritional modeling.",
            "economic_contribution": "Predictive FCR optimization saving $0.05 per kg of biomass.",
            "visual_tag": "digital-profit-hud"
          }
        ];

        timelineData.forEach((item, index) => {
            const step = document.createElement('div');
            step.className = 'step';
            step.innerHTML = `
                <div class="step-number">${item.period.split('-')[0]}</div>
                <div class="step-content">
                    <span class="step-tag">${item.location}</span>
                    <h2 class="step-title">${item.title}</h2>
                    <p class="step-desc">${item.breakthrough}</p>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <span class="stat-label">Scientific Context</span>
                            <span class="stat-value">${item.impact}</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Economic ROI</span>
                            <span class="stat-value">${item.economic_contribution}</span>
                        </div>
                    </div>
                </div>
                <div class="visual-frame">
                    <div class="microscope-ui"></div>
                    <img src="${ASSET_MAPPING[item.id]}" class="render-img" alt="${item.title}">
                    <div class="impact-badge">${item.trial_ref}</div>
                </div>
            `;
            timeline.appendChild(step);
        });

        // Intersection Observer for animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('visible');
                }
            });
        }, { threshold: 0.3 });

        document.querySelectorAll('.step').forEach(step => observer.observe(step));
    });
</script>

</body>
