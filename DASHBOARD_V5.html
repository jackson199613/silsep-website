<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silsep Elite Command Center v5.0</title>
    <style>
        :root {
            --silsep-blue: #00A3FF;
            --silsep-glow: rgba(0, 163, 255, 0.4);
            --merit-gold: #FFD700;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background-color: #050505;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            background-image: radial-gradient(circle at 50% 50%, #0a1a2f 0%, #050505 100%);
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100vh;
            perspective: 1000px;
        }

        header {
            padding: 20px 40px;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--silsep-blue);
            text-transform: uppercase;
        }

        .stats {
            display: flex;
            gap: 30px;
        }

        .stat-item {
            text-align: right;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 600;
            color: white;
        }

        .stat-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        #dashboard {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 20px;
            padding: 40px;
            transform-style: preserve-3d;
            animation: floor-sway 20s ease-in-out infinite alternate;
        }

        @keyframes floor-sway {
            from { transform: rotateX(2deg) rotateY(-1deg); }
            to { transform: rotateX(-2deg) rotateY(1deg); }
        }

        .pod {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.165, 0.84, 0.44, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .pod:hover {
            transform: translateZ(20px);
            border-color: var(--silsep-blue);
            box-shadow: 0 20px 50px rgba(0, 163, 255, 0.2);
        }

        .room-tag {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #000;
            padding: 4px 15px;
            border-radius: 20px;
            border: 1px solid var(--silsep-blue);
            color: var(--silsep-blue);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            box-shadow: 0 0 10px var(--silsep-glow);
            white-space: nowrap;
        }

        .bot-container {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bot-icon {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }

        .working .bot-icon {
            animation: chibi-float 2s ease-in-out infinite;
        }

        @keyframes chibi-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .hud {
            position: absolute;
            top: -60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--silsep-blue);
            border-radius: 12px;
            padding: 8px 12px;
            width: 200px;
            display: none;
            flex-direction: column;
            box-shadow: 0 0 20px var(--silsep-glow);
            pointer-events: none;
            z-index: 50;
        }

        .working .hud {
            display: flex;
        }

        .hud-goal {
            font-size: 9px;
            color: var(--silsep-blue);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .hud-task {
            font-size: 12px;
            font-weight: 500;
            line-height: 1.2;
        }

        .hud-eta {
            position: absolute;
            right: 8px;
            bottom: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .eta-ring {
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: var(--silsep-blue);
            border-radius: 50%;
            animation: rotate 1s linear infinite;
        }

        @keyframes rotate {
            to { transform: rotate(360deg); }
        }

        .eta-text {
            font-size: 10px;
            color: #888;
            font-variant-numeric: tabular-nums;
        }

        .merit {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .merit-star {
            color: var(--merit-gold);
            font-size: 12px;
        }

        .agent-info {
            text-align: center;
        }

        .agent-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .agent-role {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        #lounge {
            grid-column: 1 / -1;
            background: rgba(0, 163, 255, 0.05);
            border: 1px dashed var(--silsep-blue);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        #lounge::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(0, 163, 255, 0.1), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            from { transform: translateX(-100%); }
            to { transform: translateX(100%); }
        }

        .lounge-label {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%) rotate(-90deg);
            color: var(--silsep-blue);
            font-weight: 900;
            letter-spacing: 5px;
            opacity: 0.3;
        }

        .sync-indicator {
            position: fixed;
            bottom: 20px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 12px;
            color: #555;
        }

        .sync-bar {
            width: 100px;
            height: 2px;
            background: #222;
            position: relative;
            overflow: hidden;
        }

        .sync-progress {
            position: absolute;
            top: 0; left: 0; height: 100%;
            background: var(--silsep-blue);
            width: 0%;
        }
    </style>
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">Silsep Elite Command</div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="active-count">0</div>
                    <div class="stat-label">Active Agents</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="total-merit">0</div>
                    <div class="stat-label">Total Merit</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="last-update">--:--</div>
                    <div class="stat-label">Last Sync</div>
                </div>
            </div>
        </header>

        <div id="dashboard"></div>
        <div id="lounge">
            <div class="lounge-label">LOUNGE</div>
            <div id="lounge-container"></div>
        </div>

        <div class="sync-indicator">
            <div class="sync-bar"><div class="sync-progress" id="sync-progress"></div></div>
            <span>SYNCING REAL-TIME DATA</span>
        </div>
    </div>

    <script src="DATA.js"></script>
    <script>
        const REFRESH_RATE = 5000;
        const dashboard = document.getElementById('dashboard');
        const lounge = document.getElementById('lounge-container');
        const syncProgress = document.getElementById('sync-progress');

        const icons = {
            manager: "👑",
            developer: "💻",
            sales: "📣",
            research: "🌍",
            seo: "🔍",
            strategy: "🏮",
            designer: "🎨"
        };

        function formatTime(ms) {
            const sec = Math.floor(ms / 1000);
            const m = Math.floor(sec / 60);
            const s = sec % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        function update() {
            syncProgress.style.transition = 'none';
            syncProgress.style.width = '0%';
            setTimeout(() => {
                syncProgress.style.transition = `width ${REFRESH_RATE}ms linear`;
                syncProgress.style.width = '100%';
            }, 50);

            const data = window.AGENT_DATA || { agents: [] };
            
            dashboard.innerHTML = '';
            lounge.innerHTML = '';
            
            let active = 0;
            let totalMerit = 0;

            data.agents.forEach(agent => {
                totalMerit += agent.merit_points;
                const stars = "🌟".repeat(Math.min(5, Math.floor(agent.merit_points / 50)));
                
                const card = document.createElement('div');
                card.className = `pod ${agent.status}`;
                
                const etaStr = agent.eta_seconds > 0 ? formatTime(agent.eta_seconds * 1000) : "0:00";

                card.innerHTML = `
                    <div class="room-tag">${agent.parent_goal || 'Project Base'}</div>
                    <div class="merit">${stars}</div>
                    <div class="hud">
                        <div class="hud-goal">${agent.parent_goal || 'Standby'}</div>
                        <div class="hud-task">${agent.sub_task}</div>
                        <div class="hud-eta">
                            <div class="eta-ring"></div>
                            <div class="eta-text">${etaStr}</div>
                        </div>
                    </div>
                    <div class="bot-container">
                        <div class="bot-icon" style="font-size: 60px;">${icons[agent.role] || '🤖'}</div>
                    </div>
                    <div class="agent-info">
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-role">${agent.role}</div>
                    </div>
                `;

                if (agent.status === 'working' || agent.status === 'thinking') {
                    active++;
                    dashboard.appendChild(card);
                } else {
                    card.classList.remove('pod');
                    card.classList.add('bot-container');
                    card.style.transform = 'scale(0.8)';
                    lounge.appendChild(card);
                }
            });

            document.getElementById('active-count').innerText = active;
            document.getElementById('total-merit').innerText = totalMerit;
            document.getElementById('last-update').innerText = new Date().toLocaleTimeString();
        }

        setInterval(update, REFRESH_RATE);
        update();
    </script>
</body>
</html>
